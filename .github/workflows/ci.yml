name: CI

on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install dependencies
        run: | 
          pip install -r requirements.txt
      - name: Lint code
        run: | 
          flake8 .
      - name: Run tests
        run: | 
          pytest